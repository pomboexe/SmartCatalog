# Produção — imagens otimizadas (nginx + node dist)
# Uso: docker compose -f docker-compose.prod.yml up --build
name: smartcatalog-prod

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: ./backend
      target: build
    environment:
      MONGODB_URI: mongodb://mongo:27017/smartcatalog
    depends_on:
      mongo:
        condition: service_healthy
    command: npm run seed
    restart: "no"

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    environment:
      PORT: 3333
      MONGODB_URI: mongodb://mongo:27017/smartcatalog
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      mongo:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data_prod:
